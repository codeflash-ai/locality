name: release Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Verify release tag is current main
        run: |
          git fetch --force --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}
          tag_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          main_commit="$(git rev-parse "origin/main^{commit}")"
          if [[ "${tag_commit}" != "${main_commit}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} must point at current origin/main (${main_commit}); got ${tag_commit}."
            exit 1
          fi

      - name: Verify tag matches app version
        run: |
          version="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' apps/desktop/src-tauri/tauri.conf.json | head -n 1)"
          if [[ -z "${version}" ]]; then
            echo "::error::Could not read Tauri app version."
            exit 1
          fi
          expected="v${version}"
          if [[ "${RELEASE_TAG}" != "${expected}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match app version ${version}; expected ${expected}."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Select stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fuse3 \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            sqlite3

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace --all-targets --locked

      - name: Run real Linux FUSE smoke test
        run: LOCALITY_FUSE_SMOKE=1 LOCALITY_FUSE_SMOKE_REQUIRED=1 tests/linux_fuse_smoke.sh

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build desktop web UI
        run: npm run build
        working-directory: apps/desktop

  linux-x64:
    name: Build and publish Linux x64
    needs: release-preflight
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      PUBLISH_CHANNEL: release
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
      TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest-linux.json
      TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      LINUX_REPO_BASE_URL: ${{ vars.LINUX_REPO_BASE_URL || 'https://codeflash-ai.github.io/locality' }}
      LINUX_REPO_GPG_PRIVATE_KEY: ${{ secrets.LINUX_REPO_GPG_PRIVATE_KEY }}
      LINUX_REPO_GPG_PASSPHRASE: ${{ secrets.LINUX_REPO_GPG_PASSPHRASE }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Verify release tag is current main
        run: |
          git fetch --force --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}
          tag_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          main_commit="$(git rev-parse "origin/main^{commit}")"
          if [[ "${tag_commit}" != "${main_commit}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} must point at current origin/main (${main_commit}); got ${tag_commit}."
            exit 1
          fi
          echo "Release tag ${RELEASE_TAG} points at current origin/main (${main_commit})."

      - name: Verify tag matches app version
        run: |
          version="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' apps/desktop/src-tauri/tauri.conf.json | head -n 1)"
          if [[ -z "${version}" ]]; then
            echo "::error::Could not read Tauri app version."
            exit 1
          fi
          expected="v${version}"
          if [[ "${RELEASE_TAG}" != "${expected}" ]]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match app version ${version}; expected ${expected}."
            exit 1
          fi
          echo "APP_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Select stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            fuse3 \
            libayatana-appindicator3-dev \
            libfuse3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            apt-utils \
            createrepo-c \
            dpkg-dev \
            gnupg \
            patchelf \
            pkg-config \
            rpm \
            sqlite3 \
            zstd

      - name: Install Node dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Verify updater and repository secrets
        run: |
          missing=0
          for name in TAURI_UPDATER_PUBKEY TAURI_SIGNING_PRIVATE_KEY LINUX_REPO_GPG_PRIVATE_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required secret or environment value: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Build and validate Linux packages
        run: make publish-linux

      - name: Create standard GitHub asset names
        run: |
          rm -rf target/release/github-assets
          mkdir -p target/release/github-assets

          deb="target/release/bundle/linux/Locality-release-linux-x86_64.deb"
          rpm="target/release/bundle/linux/Locality-release-linux-x86_64.rpm"
          appimage="target/release/bundle/updater/Locality-release-linux-x86_64.AppImage"
          for artifact in "${deb}" "${rpm}" "${appimage}"; do
            if [[ ! -f "${artifact}" ]]; then
              echo "::error::Could not find Linux artifact ${artifact}."
              exit 1
            fi
          done
          if [[ ! -f "${appimage}.sig" ]]; then
            echo "::error::Could not find Linux updater signature ${appimage}.sig."
            exit 1
          fi

          cp "${deb}" "target/release/github-assets/Locality_Linux_v${APP_VERSION}.deb"
          cp "${deb}" "target/release/github-assets/Locality_Linux.deb"
          cp "${rpm}" "target/release/github-assets/Locality_Linux_v${APP_VERSION}.rpm"
          cp "${rpm}" "target/release/github-assets/Locality_Linux.rpm"
          cp "${appimage}" "target/release/github-assets/Locality_Linux_v${APP_VERSION}.AppImage"
          cp "${appimage}.sig" "target/release/github-assets/Locality_Linux_v${APP_VERSION}.AppImage.sig"
          cp "${appimage}" "target/release/github-assets/Locality_Linux.AppImage"
          cp "${appimage}.sig" "target/release/github-assets/Locality_Linux.AppImage.sig"

          for artifact in \
            target/release/github-assets/Locality_Linux_v${APP_VERSION}.deb \
            target/release/github-assets/Locality_Linux.deb \
            target/release/github-assets/Locality_Linux_v${APP_VERSION}.rpm \
            target/release/github-assets/Locality_Linux.rpm \
            target/release/github-assets/Locality_Linux_v${APP_VERSION}.AppImage \
            target/release/github-assets/Locality_Linux.AppImage
          do
            sha256sum "${artifact}" | sed "s#  ${artifact}#  $(basename "${artifact}")#" > "${artifact}.sha256"
          done

      - name: Render updater manifest and package repositories
        env:
          GITHUB_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          UPDATER_MANIFEST_OUTPUT: target/release/bundle/updater/latest-linux.json
          UPDATER_LINUX_X86_64_ARTIFACT: target/release/github-assets/Locality_Linux_v${{ env.APP_VERSION }}.AppImage
          UPDATER_NOTES: Locality ${{ env.APP_VERSION }} Linux update.
        run: |
          make render-updater-manifest
          make render-linux-repositories

      - name: Collect release assets
        run: |
          cp target/release/bundle/updater/latest-linux.json target/release/github-assets/
          sha256sum target/release/github-assets/* > target/release/github-assets/SHA256SUMS-linux
          ls -la target/release/github-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        run: |
          create_args=(--repo "${GITHUB_REPOSITORY}" --verify-tag --title "Locality ${APP_VERSION}" --notes "Release assets are still being published.")
          edit_args=(--repo "${GITHUB_REPOSITORY}" --title "Locality ${APP_VERSION}")
          if [[ "${PRERELEASE}" == "true" ]]; then
            create_args+=(--prerelease --latest=false)
            edit_args+=(--prerelease=true --latest=false)
          else
            create_args+=(--latest=false)
            edit_args+=(--prerelease=false)
          fi
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" "${edit_args[@]}"
          else
            gh release create "${RELEASE_TAG}" "${create_args[@]}"
          fi

      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" target/release/github-assets/* --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Configure GitHub Pages
        if: env.PRERELEASE != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Linux repository Pages artifact
        if: env.PRERELEASE != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/release/linux-repo

      - name: Deploy Linux package repositories
        if: env.PRERELEASE != 'true'
        uses: actions/deploy-pages@v4
