name: ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "docs-site/**"

jobs:
  oauth-service:
    name: OAuth service tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/oauth-service/package-lock.json
      - name: Install OAuth service dependencies
        run: npm ci
        working-directory: apps/oauth-service
      - name: Check OAuth service
        run: npm run check
        working-directory: apps/oauth-service
      - name: Audit OAuth service dependencies
        run: npm audit
        working-directory: apps/oauth-service

  linux:
    name: Linux tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fuse3 \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            sqlite3
      - name: Report Linux FUSE coverage
        run: |
          if [ -e /dev/fuse ]; then
            echo "::notice::/dev/fuse is present. This workflow will run the real Linux FUSE mount smoke test."
          else
            echo "::error::/dev/fuse is not present. Real online-only FUSE mount smoke is not covered by this hosted runner."
            exit 1
          fi
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Run Rust tests
        run: cargo test --workspace --all-targets
      - name: Run real Linux FUSE smoke test
        run: LOCALITY_FUSE_SMOKE=1 LOCALITY_FUSE_SMOKE_REQUIRED=1 tests/linux_fuse_smoke.sh
      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop
      - name: Build desktop web UI
        run: npm run build
        working-directory: apps/desktop

  windows:
    name: Windows tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Windows Rust tests
        run: >
          cargo test
          -p locality-core
          -p locality-connector
          -p locality-store
          -p locality-platform
          -p locality-notion
          -p localityd
          -p loc-cli
          -p locality-cloud-files
          --all-targets
          --no-fail-fast
      - name: Check Linux-only FUSE stub
        run: cargo check -p locality-fuse
      - name: Check Windows desktop shell
        run: cargo check -p locality-desktop

  macos:
    name: macOS tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Report macOS File Provider coverage
        run: |
          echo "::warning::This hosted macOS job compiles the File Provider code, but does not register a real File Provider domain. Real online-only File Provider smoke needs a signed app/extension and macOS user approval."
      - name: Run Rust tests
        run: cargo test --workspace --all-targets
      - name: Build macOS File Provider package
        run: swift build --package-path platform/macos/LocalityFileProvider
      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop
      - name: Build desktop web UI
        run: npm run build
        working-directory: apps/desktop
