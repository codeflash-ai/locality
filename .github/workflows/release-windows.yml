name: release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Release preflight
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Verify release tag is current main
        shell: pwsh
        run: |
          git fetch --force --no-tags origin `
            "+refs/heads/main:refs/remotes/origin/main" `
            "+refs/tags/${env:RELEASE_TAG}:refs/tags/${env:RELEASE_TAG}"
          $tagCommit = git rev-parse "${env:RELEASE_TAG}^{}"
          $mainCommit = git rev-parse "origin/main^{}"
          if ($tagCommit -ne $mainCommit) {
            Write-Error "Release tag $env:RELEASE_TAG must point at current origin/main ($mainCommit); got $tagCommit."
            exit 1
          }

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $config = Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $expected = "v$($config.version)"
          if ($env:RELEASE_TAG -ne $expected) {
            Write-Error "Release tag $env:RELEASE_TAG does not match app version $($config.version); expected $expected."
            exit 1
          }

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Select stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Windows Rust tests
        run: >
          cargo test
          -p locality-core
          -p locality-connector
          -p locality-store
          -p locality-platform
          -p locality-notion
          -p localityd
          -p loc-cli
          -p locality-cloud-files
          --all-targets
          --locked

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build desktop web UI
        run: npm run build
        working-directory: apps/desktop

  windows-x64:
    name: Build and publish Windows x64
    needs: release-preflight
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      PUBLISH_CHANNEL: release
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
      TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest-windows.json
      TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
      AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
      AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
      WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ vars.WINDOWS_CODESIGN_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Verify release tag is current main
        shell: pwsh
        run: |
          git fetch --force --no-tags origin `
            "+refs/heads/main:refs/remotes/origin/main" `
            "+refs/tags/${env:RELEASE_TAG}:refs/tags/${env:RELEASE_TAG}"
          $tagCommit = git rev-parse "${env:RELEASE_TAG}^{}"
          $mainCommit = git rev-parse "origin/main^{}"
          if ($tagCommit -ne $mainCommit) {
            Write-Error "Release tag $env:RELEASE_TAG must point at current origin/main ($mainCommit); got $tagCommit."
            exit 1
          }
          Write-Host "Release tag $env:RELEASE_TAG points at current origin/main ($mainCommit)."

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $config = Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $expected = "v$($config.version)"
          if ($env:RELEASE_TAG -ne $expected) {
            Write-Error "Release tag $env:RELEASE_TAG does not match app version $($config.version); expected $expected."
            exit 1
          }
          "APP_VERSION=$($config.version)" >> $env:GITHUB_ENV

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Select stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Node dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Verify release secrets
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in @(
            "TAURI_UPDATER_PUBKEY",
            "TAURI_SIGNING_PRIVATE_KEY"
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required secret or environment value: $($missing -join ', ')"
            exit 1
          }

      - name: Configure Authenticode signing
        id: windows-signing
        shell: pwsh
        run: |
          $azureNames = @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "AZURE_ARTIFACT_SIGNING_ENDPOINT",
            "AZURE_ARTIFACT_SIGNING_ACCOUNT",
            "AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE"
          )

          $missing = @()
          $present = @()
          foreach ($name in $azureNames) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            } else {
              $present += $name
            }
          }

          if ($present.Count -eq $azureNames.Count) {
            "enabled=true" >> $env:GITHUB_OUTPUT
            "PUBLISH_REQUIRE_SIGNING=1" >> $env:GITHUB_ENV
            "LOCALITY_WINDOWS_EXTERNAL_CODESIGN=1" >> $env:GITHUB_ENV
            Write-Host "Azure Artifact Signing is configured; Windows Authenticode signing enabled."
          } elseif ($present.Count -eq 0) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            "PUBLISH_REQUIRE_SIGNING=0" >> $env:GITHUB_ENV
            "LOCALITY_WINDOWS_EXTERNAL_CODESIGN=" >> $env:GITHUB_ENV
            Write-Warning "Azure Artifact Signing secrets are not configured; publishing unsigned Windows installer assets."
          } else {
            Write-Error "Partial Azure Artifact Signing configuration. Missing: $($missing -join ', ')"
            exit 1
          }

      - name: Azure login
        if: steps.windows-signing.outputs.enabled == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare unsigned Windows sidecars
        shell: pwsh
        env:
          LOCALITY_WINDOWS_EXTERNAL_CODESIGN: ""
        run: ./apps/desktop/scripts/prepare-windows-bundle.ps1

      - name: Sign Windows sidecars
        if: steps.windows-signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\apps\desktop\src-tauri\windows
          files-folder-filter: exe
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Validate signed Windows sidecars
        if: steps.windows-signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          . ./scripts/windows-codesign.ps1
          foreach ($name in @("loc.exe", "localityd.exe", "locality-cloud-files.exe")) {
            Assert-LocalityWindowsSigned -Path (Join-Path "apps/desktop/src-tauri/windows" $name)
          }

      - name: Build, sign, and validate Windows installer
        shell: pwsh
        env:
          LOCALITY_WINDOWS_BUNDLE_PREPARED: "1"
          PUBLISH_ALLOW_DIRTY: "1"
        run: ./scripts/publish-windows.ps1

      - name: Sign Windows installers
        if: steps.windows-signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\target\release\bundle\windows
          files-folder-filter: exe
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Validate signed Windows installers
        if: steps.windows-signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          . ./scripts/windows-codesign.ps1
          Get-ChildItem target/release/bundle/windows -Filter *.exe -File | ForEach-Object {
            Assert-LocalityWindowsSigned -Path $_.FullName
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -Encoding ascii -LiteralPath "$($_.FullName).sha256"
          }

      - name: Refresh Windows updater signatures
        if: steps.windows-signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          Get-ChildItem target/release/bundle/windows -Filter *.exe -File | ForEach-Object {
            npm --prefix apps/desktop run tauri -- signer sign $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "failed to refresh updater signature for $($_.FullName)"
            }
          }

      - name: Create standard GitHub asset names
        shell: pwsh
        run: |
          $source = "target/release/bundle/windows/Locality-release-windows-x86_64-setup.exe"
          $destination = "target/release/bundle/windows/Locality_Windows_v$env:APP_VERSION.exe"
          $latestDestination = "target/release/bundle/windows/Locality_Windows.exe"
          if (-not (Test-Path -LiteralPath $source)) {
            Write-Error "Could not find Windows installer $source."
            exit 1
          }
          if (-not (Test-Path -LiteralPath "$source.sig")) {
            Write-Error "Could not find Windows updater signature $source.sig."
            exit 1
          }
          Copy-Item -LiteralPath $source -Destination $destination -Force
          Copy-Item -LiteralPath "$source.sig" -Destination "$destination.sig" -Force
          Copy-Item -LiteralPath $source -Destination $latestDestination -Force
          Copy-Item -LiteralPath "$source.sig" -Destination "$latestDestination.sig" -Force
          foreach ($path in @($destination, $latestDestination)) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLowerInvariant()
            "$hash  $(Split-Path -Leaf $path)" | Set-Content -Encoding ascii -LiteralPath "$path.sha256"
          }

      - name: Render Windows updater manifest
        shell: bash
        env:
          GITHUB_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          UPDATER_MANIFEST_OUTPUT: target/release/bundle/updater/latest-windows.json
          UPDATER_WINDOWS_X86_64_ARTIFACT: target/release/bundle/windows/Locality_Windows_v${{ env.APP_VERSION }}.exe
          UPDATER_NOTES: Locality ${{ env.APP_VERSION }} Windows update.
        run: scripts/render-tauri-updater-manifest.sh

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/release/github-assets | Out-Null
          Copy-Item "target/release/bundle/windows/Locality_Windows_v$env:APP_VERSION.exe*" target/release/github-assets/
          Copy-Item target/release/bundle/windows/Locality_Windows.exe* target/release/github-assets/
          Copy-Item target/release/bundle/updater/latest-windows.json target/release/github-assets/
          Get-ChildItem target/release/github-assets -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content -Encoding ascii target/release/github-assets/SHA256SUMS-windows
          Get-ChildItem target/release/github-assets

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $createArgs = @("release", "create", $env:RELEASE_TAG, "--repo", $env:GITHUB_REPOSITORY, "--verify-tag", "--title", "Locality $env:APP_VERSION", "--notes", "Release assets are still being published.")
          $editArgs = @("release", "edit", $env:RELEASE_TAG, "--repo", $env:GITHUB_REPOSITORY, "--title", "Locality $env:APP_VERSION")
          if ($env:PRERELEASE -eq "true") {
            $createArgs += @("--prerelease", "--latest=false")
            $editArgs += @("--prerelease=true", "--latest=false")
          } else {
            $createArgs += @("--latest=false")
            $editArgs += @("--prerelease=false")
          }
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -eq 0) {
            gh @editArgs
          } else {
            gh @createArgs
          }

      - name: Upload GitHub Release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload $env:RELEASE_TAG target/release/github-assets/* --repo $env:GITHUB_REPOSITORY --clobber
