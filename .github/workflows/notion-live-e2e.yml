name: notion-live-e2e

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: notion-live-e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notion-live:
    name: Notion live e2e
    runs-on: ubuntu-latest
    environment: notion-live-e2e
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOCALITY_NOTION_LIVE_PARENT_PAGE: ${{ secrets.LOCALITY_NOTION_LIVE_PARENT_PAGE || secrets.AFS_NOTION_LIVE_PARENT_PAGE }}
      LOCALITY_NOTION_LIVE_DIR: /tmp/locality-notion-live
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check live Notion secrets
        id: live-secrets
        run: |
          if [ -n "$NOTION_TOKEN" ] && [ -n "$LOCALITY_NOTION_LIVE_PARENT_PAGE" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping live Notion e2e because NOTION_TOKEN or LOCALITY_NOTION_LIVE_PARENT_PAGE is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run connector live integrity tests
        if: steps.live-secrets.outputs.configured == 'true'
        run: cargo test -p locality-notion --test live_integrity -- --ignored --test-threads=1
      - name: Run mounted workflow live e2e
        if: steps.live-secrets.outputs.configured == 'true'
        run: cargo test -p loc-cli --test e2e_push_workflow live_ -- --ignored --test-threads=1

  windows-cloud-files-live:
    name: Windows Cloud Files live e2e
    runs-on: windows-latest
    timeout-minutes: 30
    environment: notion-live-e2e
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOCALITY_NOTION_LIVE_PARENT_PAGE: ${{ secrets.LOCALITY_NOTION_LIVE_PARENT_PAGE || secrets.AFS_NOTION_LIVE_PARENT_PAGE }}
      LOCALITY_WINDOWS_CLOUD_FILES_LIVE: "1"
      LOCALITY_WINDOWS_CLOUD_FILES_LIVE_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check live Notion secrets
        id: live-secrets
        shell: pwsh
        run: |
          if ($env:NOTION_TOKEN -and $env:LOCALITY_NOTION_LIVE_PARENT_PAGE) {
            "configured=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "::notice::Skipping Windows Cloud Files live e2e because NOTION_TOKEN or LOCALITY_NOTION_LIVE_PARENT_PAGE is not configured."
            "configured=false" >> $env:GITHUB_OUTPUT
          }
      - name: Run Windows Cloud Files live Notion e2e
        if: steps.live-secrets.outputs.configured == 'true'
        shell: pwsh
        run: ./tests/windows_cloud_files_live.ps1
