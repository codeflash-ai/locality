name: notion-live-e2e

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
  workflow_dispatch:

concurrency:
  group: notion-live-e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notion-live:
    name: Notion connector live e2e
    runs-on: ubuntu-latest
    environment: notion-live-e2e
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOCALITY_NOTION_LIVE_PARENT_PAGE: ${{ secrets.LOCALITY_NOTION_LIVE_PARENT_PAGE || secrets.AFS_NOTION_LIVE_PARENT_PAGE }}
      LOCALITY_NOTION_LIVE_DIR: /tmp/locality-notion-live
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check live Notion secrets
        run: |
          missing=()
          [ -n "$NOTION_TOKEN" ] || missing+=("NOTION_TOKEN")
          [ -n "$LOCALITY_NOTION_LIVE_PARENT_PAGE" ] || missing+=("LOCALITY_NOTION_LIVE_PARENT_PAGE or AFS_NOTION_LIVE_PARENT_PAGE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Live Notion e2e is required on main but missing secrets: ${missing[*]}"
            exit 1
          fi
      - name: Seed stored Notion credential
        run: |
          secret_ref="connection:notion-default"
          secret_hex="$(printf '%s' "$secret_ref" | od -An -tx1 -v | tr -d ' \n')"
          mkdir -p "$HOME/.loc/credentials"
          printf '%s' "$NOTION_TOKEN" > "$HOME/.loc/credentials/$secret_hex"
          chmod 600 "$HOME/.loc/credentials/$secret_hex"
      - name: Run connector live integrity tests
        run: env -u NOTION_TOKEN -u NOTION_AT cargo test -p locality-notion --test live_integrity -- --ignored --test-threads=1

  mounted-workflow-live:
    name: Notion mounted workflow live e2e
    runs-on: ubuntu-latest
    environment: notion-live-e2e
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOCALITY_NOTION_LIVE_PARENT_PAGE: ${{ secrets.LOCALITY_NOTION_LIVE_PARENT_PAGE || secrets.AFS_NOTION_LIVE_PARENT_PAGE }}
      LOCALITY_NOTION_LIVE_DIR: /tmp/locality-notion-live
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check live Notion secrets
        run: |
          missing=()
          [ -n "$NOTION_TOKEN" ] || missing+=("NOTION_TOKEN")
          [ -n "$LOCALITY_NOTION_LIVE_PARENT_PAGE" ] || missing+=("LOCALITY_NOTION_LIVE_PARENT_PAGE or AFS_NOTION_LIVE_PARENT_PAGE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Live Notion e2e is required on main but missing secrets: ${missing[*]}"
            exit 1
          fi
      - name: Seed stored Notion credential
        run: |
          secret_ref="connection:notion-default"
          secret_hex="$(printf '%s' "$secret_ref" | od -An -tx1 -v | tr -d ' \n')"
          mkdir -p "$HOME/.loc/credentials"
          printf '%s' "$NOTION_TOKEN" > "$HOME/.loc/credentials/$secret_hex"
          chmod 600 "$HOME/.loc/credentials/$secret_hex"
      - name: Run mounted workflow live e2e from stored credential
        run: env -u NOTION_TOKEN -u NOTION_AT cargo test -p loc-cli --test e2e_push_workflow live_ -- --ignored --test-threads=1

  linux-fuse-live:
    name: Linux FUSE live Notion e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: notion-live-e2e
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOCALITY_NOTION_LIVE_PARENT_PAGE: ${{ secrets.LOCALITY_NOTION_LIVE_PARENT_PAGE || secrets.AFS_NOTION_LIVE_PARENT_PAGE }}
      LOCALITY_LIVE_NOTION_VFS_PUSH_PULL: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fuse3 \
            libfuse3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            sqlite3
      - name: Check live Notion secrets and FUSE device
        run: |
          missing=()
          [ -n "$NOTION_TOKEN" ] || missing+=("NOTION_TOKEN")
          [ -n "$LOCALITY_NOTION_LIVE_PARENT_PAGE" ] || missing+=("LOCALITY_NOTION_LIVE_PARENT_PAGE or AFS_NOTION_LIVE_PARENT_PAGE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Live Linux FUSE Notion e2e is required on main but missing secrets: ${missing[*]}"
            exit 1
          fi
          if [ ! -e /dev/fuse ]; then
            echo "::error::/dev/fuse is not present. Real Linux FUSE live Notion e2e cannot run on this runner."
            exit 1
          fi
      - name: Seed stored Notion credential
        run: |
          secret_ref="connection:notion-default"
          secret_hex="$(printf '%s' "$secret_ref" | od -An -tx1 -v | tr -d ' \n')"
          mkdir -p "$HOME/.loc/credentials"
          printf '%s' "$NOTION_TOKEN" > "$HOME/.loc/credentials/$secret_hex"
          chmod 600 "$HOME/.loc/credentials/$secret_hex"
      - name: Run desktop Live Mode live e2e
        env:
          LOCALITY_DESKTOP_LIVE_MODE_E2E_TIMEOUT_SECS: "180"
        run: |
          cargo build -p localityd
          cargo test -p locality-desktop live_mode_bidirectional_cloudstorage_markdown_e2e -- --ignored --exact --test-threads=1 --nocapture
      - name: Run Linux FUSE live Notion e2e from stored credential
        run: env -u NOTION_TOKEN -u NOTION_AT tests/live_notion_vfs_push_pull.sh

  windows-cloud-files-live:
    name: Windows Cloud Files live e2e
    runs-on: windows-latest
    timeout-minutes: 30
    environment: notion-live-e2e
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOCALITY_NOTION_LIVE_PARENT_PAGE: ${{ secrets.LOCALITY_NOTION_LIVE_PARENT_PAGE || secrets.AFS_NOTION_LIVE_PARENT_PAGE }}
      LOCALITY_WINDOWS_CLOUD_FILES_LIVE: "1"
      LOCALITY_WINDOWS_CLOUD_FILES_LIVE_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check live Notion secrets
        shell: pwsh
        run: |
          $missing = @()
          if (-not $env:NOTION_TOKEN) {
            $missing += "NOTION_TOKEN"
          }
          if (-not $env:LOCALITY_NOTION_LIVE_PARENT_PAGE) {
            $missing += "LOCALITY_NOTION_LIVE_PARENT_PAGE or AFS_NOTION_LIVE_PARENT_PAGE"
          }
          if ($missing.Count -gt 0) {
            Write-Host "::error::Live Notion e2e is required on main but missing secrets: $($missing -join ', ')"
            exit 1
          }
      - name: Seed stored Notion credential
        shell: pwsh
        run: |
          $secretRef = "connection:notion-default"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($secretRef)
          $secretHex = -join ($bytes | ForEach-Object { $_.ToString("x2") })
          $credentialDir = Join-Path $HOME ".loc\credentials"
          New-Item -ItemType Directory -Force -Path $credentialDir | Out-Null
          Set-Content -LiteralPath (Join-Path $credentialDir $secretHex) -Value $env:NOTION_TOKEN -NoNewline -Encoding utf8
      - name: Run Windows Cloud Files live Notion e2e
        shell: pwsh
        run: |
          Remove-Item Env:\NOTION_TOKEN -ErrorAction SilentlyContinue
          Remove-Item Env:\NOTION_AT -ErrorAction SilentlyContinue
          ./tests/windows_cloud_files_live.ps1
